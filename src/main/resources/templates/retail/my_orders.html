<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .order-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .order-header {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-body {
            padding: 20px;
        }
        .order-item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .order-item-list li {
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
            display: flex;
            justify-content: space-between;
        }
        .order-item-list li:last-child {
            border-bottom: none;
        }
        .status-badge {
            background: #e8f5e9;
            color: var(--accent-green);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <h1><i class="fas fa-receipt"></i> Order History</h1>
    </div>
    <div class="nav-links">
        <a href="/retail/home">Back to Shop</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 style="color: #333; margin-bottom: 20px;">Your Recent Purchases</h2>

    <div class="order-card" th:each="order : ${orders}">
        <div class="order-header">
            <span><i class="fas fa-hashtag"></i> Order ID: <span th:text="${order.id}">101</span></span>
            <span><i class="far fa-calendar-alt"></i> <span th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}">Date</span></span>
        </div>

        <div class="order-body">
            <ul class="order-item-list">
                <li th:each="item : ${order.items}">
                        <span>
                            <b th:text="${item.product.name}" style="color: var(--primary-blue);">Tomato</b>
                            <span style="color: #666; font-size: 0.9em;"> (x <span th:text="${item.quantity}">2</span> kg)</span>
                        </span>
                    <span>₹<span th:text="${item.priceAtPurchase}">40.0</span> /kg</span>
                </li>
            </ul>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="status-badge" th:text="${order.status}">CONFIRMED</span>
                <h3 style="margin: 0; color: var(--accent-green);">Total: ₹<span th:text="${order.totalAmount}">500.0</span></h3>
            </div>
        </div>
    </div>

    <div th:if="${orders.isEmpty()}" style="text-align: center; padding: 50px; color: #888;">
        <i class="fas fa-shopping-basket" style="font-size: 3em; margin-bottom: 10px;"></i>
        <p>You haven't placed any orders yet.</p>
        <a href="/retail/home" class="btn btn-primary">Start Shopping</a>
    </div>
</div>

</body>
</html>
