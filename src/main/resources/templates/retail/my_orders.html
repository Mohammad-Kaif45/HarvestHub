<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .order-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .item-list { list-style: none; padding: 0; }
        .item-list li { padding: 5px 0; border-bottom: 1px dashed #eee; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>

<a href="/retail/home" class="back-link">← Back to Shop</a>
<h1>My Order History</h1>

<div class="order-card" th:each="order : ${orders}">
    <div class="order-header">
        <span>Order ID: #<span th:text="${order.id}">1</span></span>
        <span>Date: <span th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}">12-01-2026</span></span>
        <span style="color: green;">Total: ₹<span th:text="${order.totalAmount}">500</span></span>
    </div>

    <h4>Items Bought:</h4>
    <ul class="item-list">
        <li th:each="item : ${order.items}">
            <span th:text="${item.product.name}">Tomato</span>
            -
            <span th:text="${item.quantity}">2</span> kg
            (₹<span th:text="${item.priceAtPurchase}">40</span>/kg)
        </li>
    </ul>

    <p>Status: <b th:text="${order.status}">CONFIRMED</b></p>
</div>

</body>
</html>
