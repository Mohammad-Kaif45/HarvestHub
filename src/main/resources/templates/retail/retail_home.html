<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarvestHub Retail</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <h1><i class="fas fa-leaf"></i> HarvestHub</h1>
    </div>
    <div class="nav-links">
        <span>Welcome, <b th:text="${username}">User</b></span>
        <a href="/retail/cart"><i class="fas fa-shopping-cart"></i> Cart</a>
        <a href="/retail/orders"><i class="fas fa-receipt"></i> Orders</a>
        <a href="/logout" style="background: rgba(255,255,255,0.2);">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 style="color: var(--primary-blue); margin-bottom: 20px;">Fresh from the Farm</h2>

    <div class="grid-container">
        <div class="product-card" th:each="prod : ${products}">

            <div style="height: 200px; overflow: hidden; border-radius: 10px 10px 0 0; background: #f9f9f9;">
                <img th:if="${prod.imageBase64 != null}"
                     th:src="'data:image/jpeg;base64,' + ${prod.imageBase64}"
                     style="width: 100%; height: 100%; object-fit: cover;">

                <div th:unless="${prod.imageBase64 != null}"
                     style="display: flex; align-items: center; justify-content: center; height: 100%; color: #aaa;">
                    <i class="fas fa-carrot fa-3x"></i>
                </div>
            </div>

            <div style="padding: 15px;">
                <h3 th:text="${prod.name}">Tomato</h3>
                <p style="color: #666;" th:text="${prod.description}">Fresh and organic</p>

                <span class="price-tag" th:text="'₹' + ${prod.price} + ' / kg'">₹40 / kg</span>

                <p style="font-size: 0.9em; color: #888; margin-top: 5px;">
                    Stock: <span th:text="${prod.stock}">50</span> kg
                </p>

                <a th:href="@{/retail/add-to-cart/{id}(id=${prod.id})}" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    <i class="fas fa-plus"></i> Add to Cart
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
