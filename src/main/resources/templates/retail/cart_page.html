<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Cart</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <h1><i class="fas fa-shopping-cart"></i> Your Cart</h1>
    </div>
    <div class="nav-links">
        <a href="/retail/home">Continue Shopping</a>
    </div>
</nav>

<div class="container">

    <div th:if="${param.error}" style="background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffcdd2;">
        <i class="fas fa-exclamation-circle"></i> <b>Error:</b> Not enough stock available for one of your items.
    </div>

    <div th:if="${cartItems.isEmpty()}" style="text-align: center; padding: 50px;">
        <i class="fas fa-shopping-basket" style="font-size: 4em; color: #ddd;"></i>
        <h3 style="color: #666;">Your cart is empty</h3>
        <a href="/retail/home" class="btn btn-primary" style="margin-top: 15px;">Browse Products</a>
    </div>

    <div th:if="${!cartItems.isEmpty()}">
        <table class="styled-table">
            <thead>
            <tr>
                <th>Product</th>
                <th>Price (per kg)</th>
                <th>Quantity (kg)</th>
                <th>Total</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${cartItems}">
                <td>
                    <b th:text="${entry.key.name}" style="color: var(--primary-blue);">Item</b>
                </td>
                <td>₹<span th:text="${entry.key.price}">20</span></td>
                <td>
                            <span style="background: #eee; padding: 5px 10px; border-radius: 5px; font-weight: bold;">
                                <span th:text="${entry.value}">2</span> kg
                            </span>
                </td>
                <td style="font-weight: bold; color: #333;">
                    ₹<span th:text="${entry.key.price * entry.value}">40.0</span>
                </td>
            </tr>
            </tbody>
        </table>

        <div style="text-align: right; margin-top: 30px;">
            <h2 style="margin-bottom: 20px;">Grand Total: <span style="color: var(--accent-green);">₹<span th:text="${total}">100</span></span></h2>
            <a href="/retail/checkout" class="btn btn-primary" style="padding: 15px 30px; font-size: 1.2em;">
                Proceed to Checkout <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>

</div>

</body>
</html>
