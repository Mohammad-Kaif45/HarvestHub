<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        form { display: inline-block; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        input { padding: 10px; margin: 10px 0; width: 200px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<h2>Verify Your Email</h2>
<p>We sent a 6-digit code to your email. Enter it below.</p>

<p th:if="${error}" style="color: red; font-weight: bold;" th:text="${error}"></p>

<form action="/verify-otp" method="post">
    <input type="text" name="otp" placeholder="Enter Code (e.g. 123456)" required>
    <br>
    <button type="submit">Verify Account</button>
</form>

</body>
</html>
