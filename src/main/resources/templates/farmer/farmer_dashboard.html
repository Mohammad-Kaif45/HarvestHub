<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <h1><i class="fas fa-tractor"></i> Farmer Portal</h1>
    </div>
    <div class="nav-links">
        <span th:text="${username}">Farmer</span>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Your Crops</h2>
        <div>
            <a href="/farmer/add" class="btn btn-primary"><i class="fas fa-plus"></i> Add Crop</a>
            <a href="/farmer/orders" class="btn" style="background-color: #0d47a1; color: white;">
                <i class="fas fa-chart-line"></i> Sales Report
            </a>
        </div>
    </div>

    <table class="styled-table">
        <thead>
        <tr>
            <th>Image</th> <th>Crop Name</th>
            <th>Price (₹)</th>
            <th>Stock (kg)</th>
            <th>Type</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">

            <td>
                <img th:if="${product.imageBase64 != null}"
                     th:src="'data:image/jpeg;base64,' + ${product.imageBase64}"
                     style="width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd;">
                <span th:unless="${product.imageBase64 != null}" style="color: #999; font-size: 0.8em;">No Image</span>
            </td>

            <td th:text="${product.name}">Tomato</td>
            <td th:text="${product.price}">40.0</td>
            <td th:text="${product.stock}">100</td>
            <td>
                <span th:if="${product.listingType == 'RETAIL'}" style="color: green; font-weight: bold;">Retail</span>
                <span th:if="${product.listingType == 'WHOLESALE'}" style="color: blue; font-weight: bold;">Wholesale</span>
            </td>
            <td>
                <a th:href="@{/farmer/edit/{id}(id=${product.id})}" style="color: blue; margin-right: 10px;">Edit</a>
                <a th:href="@{/farmer/delete/{id}(id=${product.id})}" style="color: red;">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
