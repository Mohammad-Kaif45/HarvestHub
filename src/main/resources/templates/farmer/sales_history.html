<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Sales</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>

<a href="/farmer/dashboard">← Back to Dashboard</a>
<h1>My Sales Reports</h1>

<table>
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Customer Name</th>
        <th>Items Sold</th>
        <th>Total Value</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="'#' + ${order.id}">#101</td>
        <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}">12-01-2026</td>

        <td th:text="${order.user.fullName}">Priya Sharma</td>

        <td>
            <ul style="margin: 0; padding-left: 20px;">
                <li th:each="item : ${order.items}"
                    th:if="${item.product.farmer.id} == ${order.items[0].product.farmer.id}">
                    <span th:text="${item.product.name}">Tomato</span>
                    (<span th:text="${item.quantity}">2</span> kg)
                </li>
            </ul>
        </td>

        <td th:text="'₹' + ${order.totalAmount}">₹500</td>
    </tr>
    </tbody>
</table>

</body>
</html>
