<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - HarvestHub</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Special Full-Screen Background for Login */
        body {
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-green));
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 25px; /* Rounded Inputs */
            box-sizing: border-box;
            background: #f9f9f9;
            transition: 0.3s;
        }
        .form-control:focus {
            background: #fff;
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 5px rgba(13, 71, 161, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border-radius: 25px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 style="color: var(--primary-blue); margin-bottom: 10px;">
        <i class="fas fa-leaf"></i> HarvestHub
    </h2>
    <p style="color: #666; margin-bottom: 30px;">Welcome back! Please login.</p>

    <div th:if="${param.success}" style="background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em;">
        <i class="fas fa-check-circle"></i> Registration successful! Please login.
    </div>

    <div th:if="${param.error}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em;">
        <i class="fas fa-exclamation-triangle"></i> Invalid Email or Password.
    </div>

    <form action="/login" method="post">
        <input type="text" name="username" class="form-control" placeholder="Email Address" required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>

        <button type="submit" class="btn btn-primary btn-login">
            Login <i class="fas fa-sign-in-alt"></i>
        </button>
    </form>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">

    <p style="font-size: 0.9em; color: #666;">New User?</p>
    <a href="/register" style="text-decoration: none; font-weight: bold; color: var(--primary-blue);">
        Create a New Account
    </a>
</div>

</body>
</html>
