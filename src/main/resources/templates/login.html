<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HarvestHub</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-green));
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 25px;
            box-sizing: border-box;
            background: #f9f9f9;
            transition: 0.3s;
        }
        .form-control:focus {
            background: #fff;
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 5px rgba(13, 71, 161, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border-radius: 25px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 style="color: var(--primary-blue); margin-bottom: 10px;">
        <i class="fas fa-leaf"></i> HarvestHub
    </h2>
    <p style="color: #666; margin-bottom: 30px;">Welcome back! Please login.</p>

    <div th:if="${param.error}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em;">
        <i class="fas fa-exclamation-triangle"></i> Invalid Email or Password.
    </div>

    <form action="/login" method="post">
        <input type="text" name="username" class="form-control" placeholder="Email Address" required>

        <div style="position: relative; width: 100%; margin-bottom: 20px;">
            <input type="password"
                   id="loginPassword"
                   name="password"
                   class="form-control"
                   placeholder="Password"
                   required
                   style="margin-bottom: 0; padding-right: 40px;">

            <span onclick="showTemporarily('loginPassword')"
                  style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;">
                <i class="fas fa-eye"></i>
            </span>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            Login <i class="fas fa-sign-in-alt"></i>
        </button>
    </form>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">

    <p style="font-size: 0.9em; color: #666;">New User?</p>
    <a href="/register" style="text-decoration: none; font-weight: bold; color: var(--primary-blue);">
        Create a New Account
    </a>
</div>

<script>
    // Password Toggle Function
    function showTemporarily(fieldId) {
        const input = document.getElementById(fieldId);
        input.type = "text";
        setTimeout(function() {
            input.type = "password";
        }, 5000);
    }

    // Check URL for "verified=true"
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('verified')) {
        Swal.fire({
            title: 'Verification Successful!',
            text: 'Your OTP has been verified. You can now login.',
            icon: 'success',
            confirmButtonText: 'Login Now',
            confirmButtonColor: '#28a745', // Green color
            timer: 6000,
            timerProgressBar: true
        }).then(() => {
            // Optional: Clean URL so popup doesn't show on refresh
            window.history.replaceState(null, null, window.location.pathname);
        });
    }
</script>

</body>
</html>
